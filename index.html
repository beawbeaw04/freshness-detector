<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบตรวจความสดอัญชัน - Ver. 2026</title>
    <style>
        @import url('https://fonts.googleapis.com');
        body { font-family: 'Prompt', sans-serif; text-align: center; margin: 0; padding: 0; transition: background 0.5s; background-color: #f8f9fa; }
        .container { padding: 15px; max-width: 450px; margin: auto; }
        
        /* ส่วนแสดงกล้อง */
        #video-container { position: relative; width: 100%; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.3); background: #000; line-height: 0; border: 4px solid #fff; }
        video { width: 100%; height: auto; }
        .reticle { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; border: 4px solid #fff; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; animation: pulse 2s infinite; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        /* การ์ดแสดงผล */
        #result-card { margin-top: 15px; padding: 20px; border-radius: 25px; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.15); border: 1px solid #eee; transition: 0.3s; }
        
        .color-display-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        #live-color-bar { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 3px 8px rgba(0,0,0,0.2); }
        #hex-text { font-family: monospace; font-size: 18px; font-weight: bold; color: #333; }

        /* แถบระดับความสด */
        .gauge-container { margin: 15px 0; text-align: left; }
        .gauge-label { font-size: 14px; margin-bottom: 5px; font-weight: 500; color: #666; }
        .progress-bg { width: 100%; height: 15px; background: #eee; border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #28a745; transition: 0.5s ease-out; }

        .status-text { font-size: 32px; font-weight: bold; margin: 5px 0; }
        .advise-text { font-size: 18px; font-weight: 500; margin-bottom: 10px; }
        .rgb-info { font-size: 12px; color: #777; background: rgba(0,0,0,0.05); padding: 4px 10px; border-radius: 10px; display: inline-block; }
        
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; } 100% { transform: translate(-50%, -50%) scale(1); } }
        button { background: #333; color: white; border: none; padding: 12px 25px; border-radius: 50px; margin-top: 15px; cursor: pointer; font-weight: bold; font-family: 'Prompt'; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="margin-bottom:10px; color:#333;">เครื่องวัดความสดอัญชัน (Digital)</h3>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="reticle"></div>
    </div>

    <div id="result-card">
        <div class="color-display-wrapper">
            <div id="live-color-bar"></div>
            <div id="hex-text">#------</div>
        </div>

        <div id="status" class="status-text">⌛ เตรียมกล้อง...</div>
        
        <div class="gauge-container">
            <div class="gauge-label">ระดับความสด: <span id="percent-text">0</span>%</div>
            <div class="progress-bg">
                <div id="progress-bar"></div>
            </div>
        </div>

        <div id="advise" class="advise-text">กรุณานำวัตถุมาไว้ตรงกลางวงกลม</div>
        <div id="rgb-val" class="rgb-info">RGB: (0, 0, 0)</div>
    </div>
    
    <button onclick="location.reload()">🔄 รีเฟรชระบบ</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const statusText = document.getElementById('status');
    const adviseText = document.getElementById('advise');
    const rgbVal = document.getElementById('rgb-val');
    const resultCard = document.getElementById('result-card');
    const liveColorBar = document.getElementById('live-color-bar');
    const hexText = document.getElementById('hex-text');
    const progressBar = document.getElementById('progress-bar');
    const percentText = document.getElementById('percent-text');

    // 1. เริ่มต้นกล้อง
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
        } catch (err) {
            statusText.innerText = "❌ กล้องไม่พร้อม";
            adviseText.innerText = "กรุณาเปิดผ่าน HTTPS หรืออนุญาตกล้อง";
        }
    }

    // 2. ฟังก์ชันแปลงสี
    function componentToHex(c) {
        var hex = c.toString(16);
        return hex.length == 1 ? "0" + hex : hex;
    }

    function rgbToHex(r, g, b) {
        return "#" + componentToHex(r) + componentToHex(g) + componentToHex(b);
    }

    // 3. ฟังก์ชันประมวลผล (หัวใจหลัก)
    function processFrame() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = 100; canvas.height = 100;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            // ดึงค่าสีจากกึ่งกลางวิดีโอ (1x1 pixel)
            ctx.drawImage(video, video.videoWidth/2, video.videoHeight/2, 1, 1, 0, 0, 1, 1);
            const p = ctx.getImageData(0, 0, 1, 1).data;
            
            const r = p[0];
            const g = p[1];
            const b = p[2];

            const currentHex = rgbToHex(r, g, b).toUpperCase();
            liveColorBar.style.backgroundColor = currentHex;
            hexText.innerText = currentHex;
            rgbVal.innerText = `RGB: (${r}, ${g}, ${b})`;

            // --- สูตรคำนวณความสด (Logic: เน้นความเด่นของ Blue ต่อ Red) ---
            const brightness = (r + g + b) / 3;
            let score = 0;

            if (brightness > 40) { 
                const total = r + g + b;
                // อัญชันสด ค่า B ต้องสูงกว่า R และ G อย่างชัดเจน
                const bRatio = b / total; 
                score = Math.round(bRatio * 230); // ปรับตัวคูณเพื่อความแม่นยำ
                if (score > 100) score = 100;
                if (score < 0) score = 0;
            }

            percentText.innerText = score;
            progressBar.style.width = score + "%";

            // --- เงื่อนไขการแสดงผล ---
            if (score >= 70) { 
                updateUI("✅ สดมาก", "ปลอดภัยต่อการบริโภค", "#28a745", "#d4edda", "#155724");
                progressBar.style.backgroundColor = "#28a745";
            } else if (score >= 40) { 
                updateUI("⚠️ เริ่มเปลี่ยนสี", "เริ่มเสื่อมสภาพ ควรระมัดระวัง", "#ffc107", "#fff3cd", "#856404");
                progressBar.style.backgroundColor = "#ffc107";
            } else if (brightness <= 40) {
                updateUI("🔍 สแกนสี...", "เลื่อนดอกอัญชันมาไว้ในวงกลม", "#f8f9fa", "white", "#333");
                progressBar.style.width = "0%";
            } else { 
                updateUI("❌ อันตราย!", "พบก๊าซเน่าเสีย/สีผิดปกติ ห้ามรับประทาน", "#dc3545", "#f8d7da", "#721c24");
                progressBar.style.backgroundColor = "#dc3545";
            }
        }
        requestAnimationFrame(processFrame);
    }

    function updateUI(status, advise, bodyBg, cardBg, textColor) {
        statusText.innerText = status;
        adviseText.innerText = advise;
        document.body.style.backgroundColor = bodyBg;
        resultCard.style.backgroundColor = cardBg;
        statusText.style.color = textColor;
        adviseText.style.color = textColor;
    }

    video.addEventListener('play', processFrame);
    startCamera();
</script>

</body>
</html>
